##
# CI caller — PRAutoBlogger
#
# Thin caller that delegates to the reusable estate CI workflow in peptide-e2e.
# workflow_call is required so deploy.yml can gate on this workflow via
# `uses: ./.github/workflows/ci.yml` (the workflow_call trigger enables that).
#
# Permissions: contents: write is required at the caller level so the reusable
# workflow's phpcbf auto-commit job can push fixes back to the PR branch.
# (GitHub enforces that callers cannot be escalated beyond their declared scope.)
#
# tests: brain-monkey — no WP install or DB required; Brain Monkey mocking only.
# line_limit_paths: includes — estate hard 300-line rule applied to includes/.
##
name: CI

on:
  pull_request: {}
  push:
    branches: [main]
  workflow_call: {}

permissions:
  contents: write

jobs:
  ci:
    uses: peptiderepo/peptide-e2e/.github/workflows/ci.yml@main
    with:
      tests: brain-monkey
    secrets: inherit

  check-constants:
    name: Check PRAUTOBLOGGER_* constants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
      - name: Check PRAUTOBLOGGER_* constants
        # Fails if any PRAUTOBLOGGER_* constant referenced in the shipped
        # plugin PHP is neither defined in prautoblogger.php nor guarded
        # by defined() at the reference site. Prevents the v0.19.0 incident
        # class (constant deleted from bootstrap, test fallback masks the gap).
        run: php scripts/check-constants.php
