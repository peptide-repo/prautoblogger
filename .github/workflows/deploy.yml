name: Deploy PRAutoBlogger to Hostinger

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prautoblogger-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI Gate (reusable)
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: write
    secrets: inherit

  deploy:
    name: Deploy (shared pipeline)
    needs: ci
    uses: peptide-repo/peptide-e2e/.github/workflows/deploy-app.yml@main
    with:
      target_path: wp-content/plugins/prautoblogger
    secrets: inherit
