name: Deploy PRAutoBlogger to Hostinger

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prautoblogger-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: PHP Lint Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
      - name: PHP Lint Check
        run: |
          set -e
          find . -name '*.php' \
            -not -path './vendor/*' \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -not -path './.github/*' \
            -print0 | xargs -0 -n1 -P4 php -l > /dev/null

  deploy:
    name: Deploy (shared pipeline)
    needs: validate
    uses: peptiderepo/peptide-e2e/.github/workflows/deploy-app.yml@main
    with:
      target_path: wp-content/plugins/prautoblogger
    secrets: inherit
